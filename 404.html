<style>
  :root {
    --paper:#F4F3EE; --ink:#0A0A0A; --red:#E63946; --orange:#F77F00; --green:#2A9D5F;
    --font-display:'Archivo Black',sans-serif;
    --font-serif:'Source Serif 4',Georgia,serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-serif);min-height:100dvh;display:grid;place-items:center;padding:2rem;}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.06;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='0.5' fill='%230a0a0a'/%3E%3C/svg%3E");background-size:4px 4px;mix-blend-mode:multiply;}
  .container{position:relative;z-index:1;max-width:640px;width:100%;border:1px solid var(--ink);padding:3rem 2.5rem;}
  .eyebrow{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--red);margin-bottom:1.5rem;}
  h1{font-family:var(--font-display);font-size:clamp(4rem,12vw,8rem);line-height:.9;letter-spacing:-.04em;text-transform:uppercase;margin-bottom:1.5rem;}
  h1 span{color:var(--red);}
  p{font-size:1.05rem;line-height:1.6;color:#444;max-width:42ch;margin-bottom:2rem;}
  .links{display:flex;gap:1rem;flex-wrap:wrap;}
  a.btn{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;padding:.75rem 1.25rem;border:1px solid var(--ink);color:var(--ink);text-decoration:none;transition:all .2s;}
  a.btn:hover{background:var(--ink);color:var(--paper);}
  a.btn.primary{background:var(--ink);color:var(--paper);}
  a.btn.primary:hover{background:var(--red);border-color:var(--red);}
  .status{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-top:2rem;padding-top:1.5rem;border-top:1px solid #ddd;}
</style>
